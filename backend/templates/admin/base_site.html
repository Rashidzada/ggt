{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | GoGreenTech Admin{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
  #header {
    background: linear-gradient(135deg, #14532d, #1f7a4d);
  }

  #branding h1,
  #branding h1 a {
    color: #fff;
  }

  #branding .brand-link {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  #branding .brand-logo {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    object-fit: contain;
    background: rgba(255, 255, 255, 0.14);
    padding: 5px;
  }

  #branding .brand-copy {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }

  #branding .brand-copy strong {
    font-size: 1.05rem;
    font-weight: 700;
  }

  #branding .brand-copy span {
    font-size: 0.78rem;
    opacity: 0.88;
  }

  div.breadcrumbs {
    background: #e5f5ec;
    color: #14532d;
  }

  .module h2,
  .module caption,
  .inline-group h2 {
    background: #1f7a4d;
  }

  .button,
  input[type="submit"],
  input[type="button"],
  .submit-row input,
  a.button {
    background: #1f7a4d;
  }

  .button.default,
  input[type="submit"].default,
  .submit-row input.default {
    background: #14532d;
  }
 </style>
{% endblock %}

{% block branding %}
<h1 id="site-name">
  <a href="{% url 'admin:index' %}" class="brand-link">
    <img
      src="{% static 'branding/gogreentech_logo.png' %}"
      alt="GoGreenTech logo"
      class="brand-logo"
    />
    <span class="brand-copy">
      <strong>GoGreenTech</strong>
      <span>Learning Academy Admin</span>
    </span>
  </a>
</h1>
{% endblock %}

{% block nav-global %}{% endblock %}
